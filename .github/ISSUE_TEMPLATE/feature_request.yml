name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem are you trying to solve? Why does existing behavior fall short?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the API or behavior you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.

  - type: dropdown
    id: package
    attributes:
      label: Relevant Package
      options:
        - AspNetCore.Multitenancy.Core
        - AspNetCore.Multitenancy.Resolvers
        - AspNetCore.Multitenancy.EFCore
        - AspNetCore.Multitenancy.Hangfire
        - AspNetCore.Multitenancy.Storage
        - AspNetCore.Multitenancy.Features
        - New Package
