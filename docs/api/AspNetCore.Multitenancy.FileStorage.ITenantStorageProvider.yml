  assemblies:
  - AspNetCore.Multitenancy.Storage
  namespace: AspNetCore.Multitenancy.FileStorage
  summary: Uploads a file. The path is automatically prefixed with the tenant ID.
  example: []
  syntax:
    content: Task<string> UploadAsync(string path, Stream content, string? contentType = null, CancellationToken cancellationToken = default)
    parameters:
    - id: path
      type: System.String
      description: Logical path (e.g., "invoices/jan.pdf").
    - id: content
      type: System.IO.Stream
      description: File content stream.
    - id: contentType
      type: System.String
      description: Optional MIME type.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: The full storage path including tenant prefix.
