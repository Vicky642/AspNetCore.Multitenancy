  - AspNetCore.Multitenancy.Features
  namespace: AspNetCore.Multitenancy.FeatureFlags
  summary: >-
    Middleware that checks <xref href="AspNetCore.Multitenancy.FeatureFlags.RequireFeatureAttribute" data-throw-if-not-resolved="false"></xref> on the matched endpoint

    and returns HTTP 404 if the feature is disabled for the current tenant's plan.


    Returns 404 (not 403) deliberately — so tenants cannot enumerate which features exist

    on other plans.
