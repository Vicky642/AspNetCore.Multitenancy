  assemblies:
  - AspNetCore.Multitenancy.Hangfire
  namespace: AspNetCore.Multitenancy.BackgroundJobs
  summary: >-
    Schedules <code class="typeparamref">TJob</code> as a recurring Hangfire job for every active tenant.

    Each tenant gets its own job entry: <code>{jobId}-{tenantId}</code>.
  example: []
  syntax:
    content: public Task ScheduleForAllAsync<TJob>(string jobId, string cron, Expression<Func<TJob, Task>> methodSelector, CancellationToken cancellationToken = default)
    parameters:
    - id: jobId
      type: System.String
      description: Base job identifier (e.g., "daily-report").
    - id: cron
      type: System.String
      description: Cron expression (e.g., <xref href="Hangfire.Cron.Daily" data-throw-if-not-resolved="false"></xref>).
    - id: methodSelector
      type: System.Linq.Expressions.Expression{System.Func{{TJob},System.Threading.Tasks.Task}}
      description: >-
        Expression pointing to the job method.

        Example: <code>job =&gt; job.ExecuteAsync()</code>
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Cancellation token.
    typeParameters:
    - id: TJob
      description: The Hangfire job type. Must have an <code>Execute()</code> or <code>ExecuteAsync()</code> method.
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Function ScheduleForAllAsync(Of TJob)(jobId As String, cron As String, methodSelector As Expression(Of Func(Of TJob, Task)), cancellationToken As CancellationToken = Nothing) As Task
