  namespace: AspNetCore.Multitenancy.EntityFrameworkCore
  summary: >-
    Applies a global query filter so that all queries for <code class="typeparamref">TEntity</code>

    are automatically scoped to the current tenant.

    Call inside <code>OnModelCreating</code>.
  example: []
  syntax:
    content: 'public static EntityTypeBuilder<TEntity> HasTenantFilter<TEntity>(this EntityTypeBuilder<TEntity> builder, Func<string?> currentTenantId) where TEntity : class, ITenantEntity'
