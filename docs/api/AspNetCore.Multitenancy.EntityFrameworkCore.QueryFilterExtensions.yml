      type: Microsoft.EntityFrameworkCore.Metadata.Builders.EntityTypeBuilder{{TEntity}}
      description: The entity type builder.
    - id: currentTenantId
      type: System.Func{System.String}
      description: A delegate that returns the current tenant ID at query time.
    typeParameters:
