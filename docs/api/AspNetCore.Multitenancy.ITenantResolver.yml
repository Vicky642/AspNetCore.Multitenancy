  summary: >-
    Attempts to resolve a <xref href="AspNetCore.Multitenancy.TenantInfo" data-throw-if-not-resolved="false"></xref> from the given HTTP context.

    Returns <code>null</code> if this resolver cannot determine the tenant.
  example: []
  syntax:
    content: Task<TenantInfo?> ResolveAsync(HttpContext context)
    parameters:
    - id: context
      type: Microsoft.AspNetCore.Http.HttpContext
      description: The current HTTP context.
    return:
      type: System.Threading.Tasks.Task{AspNetCore.Multitenancy.TenantInfo}
      description: The resolved tenant, or <code>null</code> if not resolvable by this strategy.
    content.vb: Function ResolveAsync(context As HttpContext) As Task(Of TenantInfo)
