  assemblies:
  - AspNetCore.Multitenancy.Hangfire
  namespace: AspNetCore.Multitenancy.BackgroundJobs
  summary: >-
    Adds <xref href="AspNetCore.Multitenancy.BackgroundJobs.TenantJobFilter" data-throw-if-not-resolved="false"></xref> to the Hangfire global configuration pipeline.

    Call this inside your <code>AddHangfire</code> configuration block:


    <pre><code class="lang-csharp">services.AddHangfire((sp, config) =&gt;

    {
        config.UseSqlServerStorage(...);
        config.UseTenantJobFilter(sp);
    });</code></pre>
  example: []
  syntax:
    content: public static IGlobalConfiguration UseTenantJobFilter(this IGlobalConfiguration configuration, IServiceProvider serviceProvider)
    parameters:
    - id: configuration
      type: Hangfire.IGlobalConfiguration
    - id: serviceProvider
      type: System.IServiceProvider
    return:
      type: Hangfire.IGlobalConfiguration
