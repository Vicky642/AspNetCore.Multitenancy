  assemblies:
  - AspNetCore.Multitenancy.Hangfire
  namespace: AspNetCore.Multitenancy.BackgroundJobs
  summary: >-
    Registers tenant-aware Hangfire services:


    <ul><li><xref href="AspNetCore.Multitenancy.BackgroundJobs.TenantJobFilter" data-throw-if-not-resolved="false"></xref> — propagates tenant context into jobs</li><li><xref href="AspNetCore.Multitenancy.BackgroundJobs.TenantJobActivator" data-throw-if-not-resolved="false"></xref> — resolves jobs from per-tenant DI scope</li><li><xref href="AspNetCore.Multitenancy.BackgroundJobs.TenantRecurringJobManager" data-throw-if-not-resolved="false"></xref> — schedules jobs per tenant</li></ul>

    <p>

    You still need to call <code>services.AddHangfire(...)</code> and <code>services.AddHangfireServer()</code>

    separately with your storage configuration (SQL Server, Redis, etc.).

    </p>
  example: []
  syntax:
    content: public static MultitenancyBuilder WithHangfireJobs(this MultitenancyBuilder builder)
    parameters:
    - id: builder
      type: AspNetCore.Multitenancy.MultitenancyBuilder
    return:
      type: AspNetCore.Multitenancy.MultitenancyBuilder
    content.vb: Public Shared Function WithHangfireJobs(builder As MultitenancyBuilder) As MultitenancyBuilder
