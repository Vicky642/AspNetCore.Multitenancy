  assemblies:
  - AspNetCore.Multitenancy.Core
  namespace: AspNetCore.Multitenancy
  summary: >-
    Registers the core multi-tenancy services and returns a <xref href="AspNetCore.Multitenancy.MultitenancyBuilder" data-throw-if-not-resolved="false"></xref>

    for further configuration via <code>With*</code> extension methods.
  example:
  - >-
    <pre><code class="lang-csharp">builder.Services
        .AddMultitenancy(options =&gt;
        {
            options.TenantStore = TenantStore.InMemory;
            options.IsolationStrategy = IsolationStrategy.RowLevel;
        })
        .WithHeaderResolver("X-Tenant-Id")
        .WithEFCoreIsolation&lt;AppDbContext&gt;();</code></pre>
