  assemblies:
  - AspNetCore.Multitenancy.EFCore
  namespace: AspNetCore.Multitenancy.EntityFrameworkCore.Strategies
  summary: >-
    Isolation strategy: all tenants share one database but each gets a dedicated schema

    (e.g., <code>acme.Products</code>, <code>globex.Products</code>).

    Good balance of isolation vs cost.


    The schema is taken from <xref href="AspNetCore.Multitenancy.TenantInfo.Schema" data-throw-if-not-resolved="false"></xref>. If not set, falls back to

    <xref href="AspNetCore.Multitenancy.TenantInfo.Id" data-throw-if-not-resolved="false"></xref>.
