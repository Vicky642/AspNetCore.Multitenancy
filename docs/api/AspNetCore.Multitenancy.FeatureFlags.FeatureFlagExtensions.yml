  assemblies:
  - AspNetCore.Multitenancy.Features
  namespace: AspNetCore.Multitenancy.FeatureFlags
  summary: Registers the per-tenant feature flag services.
  example: []
  syntax:
    content: public static MultitenancyBuilder WithFeatureFlags(this MultitenancyBuilder builder, Action<PlanFeatureOptions> configurePlans)
    parameters:
    - id: builder
      type: AspNetCore.Multitenancy.MultitenancyBuilder
      description: The multitenancy builder.
    - id: configurePlans
      type: System.Action{AspNetCore.Multitenancy.FeatureFlags.PlanFeatureOptions}
      description: >-
        A delegate to map subscription plans to feature sets.


        <pre><code class="lang-csharp">.WithFeatureFlags(plans =&gt;

        {
            plans.AddPlan("free",       new[] { "BasicDashboard" });
            plans.AddPlan("pro",        new[] { "BasicDashboard", "AdvancedReporting" });
            plans.AddPlan("enterprise", new[] { "BasicDashboard", "AdvancedReporting", "WhiteLabel" });
        })</code></pre>
    return:
      type: AspNetCore.Multitenancy.MultitenancyBuilder
    content.vb: Public Shared Function WithFeatureFlags(builder As MultitenancyBuilder, configurePlans As Action(Of PlanFeatureOptions)) As MultitenancyBuilder
