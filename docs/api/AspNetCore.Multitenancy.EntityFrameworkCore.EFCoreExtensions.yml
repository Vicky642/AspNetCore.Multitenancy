  namespace: AspNetCore.Multitenancy.EntityFrameworkCore
  summary: >-
    Registers the EF Core isolation services for the specified DbContext.

    This sets up the <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.TenantDbContextFactory%601" data-throw-if-not-resolved="false"></xref> and

    <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.TenantSchemaMigrator%601" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public static MultitenancyBuilder WithEFCoreIsolation<TContext>(this MultitenancyBuilder builder, Action<DbContextOptionsBuilder, string>? configureDb = null) where TContext : DbContext'
    parameters:
    - id: builder
      type: AspNetCore.Multitenancy.MultitenancyBuilder
      description: The multitenancy builder.
    - id: configureDb
      type: System.Action{Microsoft.EntityFrameworkCore.DbContextOptionsBuilder,System.String}
      description: >-
        A delegate that applies the database provider to the context options.

        Example: <code>(opts, cs) =&gt; opts.UseSqlServer(cs)</code>
    typeParameters:
    - id: TContext
      description: Your application DbContext.
    return:
      type: AspNetCore.Multitenancy.MultitenancyBuilder
    content.vb: Public Shared Function WithEFCoreIsolation(Of TContext As DbContext)(builder As MultitenancyBuilder, configureDb As Action(Of DbContextOptionsBuilder, String) = Nothing) As MultitenancyBuilder
