  namespace: AspNetCore.Multitenancy.EntityFrameworkCore.Strategies
  summary: >-
    Isolation strategy: all tenants share tables. Every table has a <code>TenantId</code> column.

    EF Core global query filters automatically scope all queries.

    Cheapest to operate. Recommended for low-risk SaaS.


    This strategy is applied automatically by <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.MultitenantDbContext" data-throw-if-not-resolved="false"></xref>.

    Entities must implement <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.ITenantEntity" data-throw-if-not-resolved="false"></xref>.
