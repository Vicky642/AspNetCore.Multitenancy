  summary: >-
    Configures the model for row-level tenant isolation.

    Applies <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.QueryFilterExtensions.ApplyTenantQueryFilters(Microsoft.EntityFrameworkCore.ModelBuilder%2cSystem.Func%7bSystem.String%7d)" data-throw-if-not-resolved="false"></xref> to all

    <xref href="AspNetCore.Multitenancy.EntityFrameworkCore.ITenantEntity" data-throw-if-not-resolved="false"></xref> entity types and adds a TenantId index for performance.
